<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
            text-align: center;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e6f2ff;
        }
        .login{
            width: 350px;
            height: 400px;
            border-radius: 10px;
            background-color: beige;
            padding:30px;
            border: 2px solid #333;
            Margin: 100px auto;   
        }
        .login button{
            background-color: black;
            color: white;
            margin:15px auto;
            display:block;
            padding:10px 10px;
        }
        .login button:hover{
            background-color: green;
            color: white;
        }
        .login label{
            display: block;
            margin-bottom: 5px;
        }

        .login input{
            margin-bottom: 15px;
        }
        
        a:hover{
            color:red;  
        }
    </style>
</head>
<body>
    <form class="login">
        <h1>Login Form</h1>
        <label for="email"><b>Email:</b></label>
        <input type="email" id="email" name="Email" placeholder="Enter you Email Id">

        <label for="pw"><b>Password:</b></label>
        <input type="password" id="pw" name="Password" placeholder="Enter you Password">

        <button>Login</button>
        <p><a href="#">Forgot Password?</a></p>
        <p>Don't have an account? <a href="#">Sign Up</a></p>

    </form>
</body>
</html>
