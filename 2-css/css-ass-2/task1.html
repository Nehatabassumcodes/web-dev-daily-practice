<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            text-align: center;
            margin:0;
            padding:0;
        }
        body{
            text-align: center;
            background-color: bisque;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .Profile-Card{
            border-style: dotted;
            width: 300px;
            height:380px;
            border:8px ridge goldenrod;
            background-color: rgb(252, 225, 247);
            border-radius: 10px;
            text-align: center;
            border-radius:10px;
            margin: 30px auto;
        }
        
        .Profile-Card img{
            display:block;
            margin:20px auto;
            border:2px solid #4361ee;
            border-radius: 10px;
            border:3px solid blue;
            padding:20px;
            
        }
        .Profile-Card button{
            padding:4px;
            background-color:blue;
            color:white;
            border-radius:5px;
            margin:10px;
        }
         .Profile-Card button:hover{
            background-color:darkblue;
        }
        
    </style>
</head>
<body>
    
    <div class="Profile-Card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTKRT9MVMT-kfHWdZFoclxn7NRPQUY-iHRekGSz4Gfdzg&s=10" width="180px" height="180px">
        <h1>Sarah</h1>
        <p> B.Tech - AIML</p>
        <button>View Profile</button>
    </div>
</body>
</html>
