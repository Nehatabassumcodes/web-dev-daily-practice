<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
           background-image: url("https://i.pinimg.com/originals/fa/4c/aa/fa4caada29c56222c82ef1234a874dbd.jpg?nii=t");
            
            background-repeat:no-repeat;
            background-size: contain;
            background-position: center;
            background-attachment:fixed;

        }

       table
        {
            width: 80%;
            font-size: 22px;
            margin: auto;
            background-color: rgba(255,255,255,0.8);
            border-collapse: collapse;
            border-radius: 8px;
        }

        th, td
        {
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h2 style="color:whitesmoke">Student Marks</h2>
    <table>
        <tr style="color:black">
            <th>Student Name</th>
            <th>Student Subject</th>
            <th>Marks</th>
        </tr>

        <tr style="color:brown">
            <td>Neha</td>
            <td>AI</td>
            <td>95</td>
        </tr>

        <tr style="color:brown">
            <td>Sindhu</td>
            <td>Cloud Computing</td>
            <td>96</td>
        </tr>

        <tr style="color:brown">
            <td>Muskan</td>
            <td>Machine Learning</td>
            <td>97</td>
        </tr>

    </table>
</body>
</html>
